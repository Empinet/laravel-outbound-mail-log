name: release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional release version (example: 1.0.0)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine release version
        id: version
        run: |
          if git describe --exact-match --tags >/dev/null 2>&1; then
            echo "Current commit is already tagged. Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"

            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Version must be in semver format: X.Y.Z"
              exit 1
            fi

            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_tag=$(git tag --list 'v*' --sort=-v:refname | { read -r first; echo "$first"; })

          if [ -z "$latest_tag" ]; then
            echo "No existing tags found. Bootstrapping release at 1.0.0"
            echo "version=1.0.0" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_version="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$base_version"

          if [ -z "$major" ] || [ -z "$minor" ] || [ -z "$patch" ]; then
            echo "Invalid existing tag format: $latest_tag"
            exit 1
          fi

          next_patch=$((patch + 1))
          next_version="$major.$minor.$next_patch"

          echo "Auto release version: $next_version"
          echo "version=$next_version" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist
        if: steps.version.outputs.skip != 'true'
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Create and push tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.version }}" -m "Release v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
